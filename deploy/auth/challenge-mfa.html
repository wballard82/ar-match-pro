<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow"><title>Verification required — AR Match Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/auth/armp-auth-config.js"></script>
<style>
:root{--p:#14A8D8;--pd:#168DE2;--bg:#07111F;--card:#0D1B2E;--line:#1A2D42;--t1:#F1F5F9;--t2:#94A3B8;--err:#F87171;--ok:#34D399}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#07111F,#0F172A);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:var(--t1)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:36px 32px;max-width:440px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.logo{font-size:18px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px}.logo span{color:var(--p)}
h1{font-size:20px;font-weight:800;margin:14px 0 6px}p.sub{font-size:13.5px;color:var(--t2);line-height:1.6;margin-bottom:20px}
label{display:block;font-size:12px;font-weight:700;color:var(--t2);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.4px}
input{width:100%;padding:12px 14px;background:#0A1626;border:1px solid var(--line);border-radius:10px;color:var(--t1);font-size:14.5px}
input:focus{outline:none;border-color:var(--p)}
button{width:100%;margin-top:20px;padding:13px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;border:none;border-radius:10px;font-size:14.5px;font-weight:700;cursor:pointer}
button:disabled{opacity:.5;cursor:default}
.msg{margin-top:14px;font-size:13px;line-height:1.5;display:none;padding:10px 12px;border-radius:8px}
.msg.err{display:block;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--err)}
.msg.ok{display:block;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--ok)}
.qr{background:#fff;border-radius:12px;padding:14px;margin:16px auto;width:216px;height:216px;display:flex;align-items:center;justify-content:center}
.qr svg,.qr img{width:188px;height:188px}
code.key{display:block;background:#0A1626;border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:8px;font-size:12.5px;word-break:break-all;color:var(--t2)}
.foot{margin-top:18px;font-size:11.5px;color:#475569;line-height:1.6}
</style></head><body><div class="card"><div class="logo">AR <span>Match</span> Pro</div>
<h1>Authenticator verification</h1>
<p class="sub">Authenticator verification is required before continuing. Enter the 6-digit code from your authenticator app.</p>
<label>6-digit code</label><input id="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456">
<button id="go">Verify</button>
<div class="msg" id="m"></div>

<div class="foot">Internal-controlled pilot access. Need help? Contact your ARMP representative at info@armatchpro.com.</div></div>
<script>
(async function(){
  var sb=armpSb(), m=document.getElementById('m');
  function err(t){m.className='msg err';m.textContent=t;}
  var s = await sb.auth.getSession();
  if(!s.data.session){ err('Please sign in first.'); setTimeout(function(){location.href='/app.html';},1200); return; }
  var f = await sb.auth.mfa.listFactors();
  var totp = f.data && f.data.totp && f.data.totp[0];
  if(!totp){ location.href='/auth/setup-mfa.html?next='+encodeURIComponent(armpNext()); return; }
  document.getElementById('go').onclick = async function(){
    var code=document.getElementById('code').value.trim();
    if(!/^[0-9]{6}$/.test(code)){err('Enter the 6-digit code.');return;}
    this.disabled=true;
    var ch = await sb.auth.mfa.challenge({factorId:totp.id});
    if(ch.error){this.disabled=false;err('Could not start verification. Try again.');return;}
    var vr = await sb.auth.mfa.verify({factorId:totp.id, challengeId:ch.data.id, code:code});
    if(vr.error){this.disabled=false;err('That code did not match. Try the current code from your app.');return;}
    location.href=armpNext();
  };
})();
</script></body></html>
