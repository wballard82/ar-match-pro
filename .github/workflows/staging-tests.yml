name: ARMP R3 — Staging Acceptance Tests (manual)
# Runs the automated portions of the staging acceptance battery. The 16-step
# human/MFA E2E is documented separately and reported per-step; this workflow
# runs: local-Postgres RLS proof, frontend/data-boundary/migration suites, the
# 503 R2 regression, and the prohibited-pattern gate. Results are uploaded as
# artifacts and summarized in the job log.
on:
  workflow_dispatch:
jobs:
  automated-suites:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: postgres }
        ports: [ '5432:5432' ]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with: { ref: pilot-auth-r3 }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install test deps
        run: npm ci || npm install
      - name: Apply shim + migrations to ephemeral Postgres, run RLS suite
        env: { PGPASSWORD: postgres }
        run: |
          psql -h localhost -U postgres -c "create database armp_test;"
          psql -h localhost -U postgres -d armp_test -v ON_ERROR_STOP=1 -f supabase/tests/local_shim.sql
          for f in supabase/migrations/*.sql; do psql -h localhost -U postgres -d armp_test -v ON_ERROR_STOP=1 -f "$f"; done
          psql -h localhost -U postgres -d armp_test -c "grant execute on function auth.uid() to anon,authenticated; grant execute on function auth.jwt() to anon,authenticated; grant execute on all functions in schema armp to anon,authenticated;"
          psql -h localhost -U postgres -d armp_test -f supabase/tests/rls_test.sql 2>&1 | tee rls_results.txt
          ! grep -q "FAIL <<<" rls_results.txt
      - name: Run full JS battery (503 R2 + R3 auth/security/data-boundary + gate)
        run: npm test 2>&1 | tee js_results.txt
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: staging-test-results, path: '*_results.txt' }
